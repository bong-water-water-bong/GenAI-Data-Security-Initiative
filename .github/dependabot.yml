 # Dependabot configuration for GenAI-Data-Security-Initiative
  # Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-depe
  ndabot.yml-file
  #
  # Notes:
  # - Security updates run automatically and are NOT controlled by this file
  #   (see: Settings -> Code security -> Dependabot security updates).
  # - Only enable an ecosystem block once a manifest for it exists in the repo,
  #   otherwise Dependabot will surface an error on every run.

  version: 2

  updates:
    # ----- GitHub Actions used by workflows in .github/workflows -----
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "weekly"
        day: "monday"
        time: "06:00"
        timezone: "Etc/UTC"
      open-pull-requests-limit: 5
      labels:
        - "dependencies"
        - "github-actions"
        - "security"
      commit-message:
        prefix: "ci"
        prefix-development: "ci"
        include: "scope"
      reviewers:
        - "GenAI-Security-Project/maintainers"
      groups:
        actions-minor-and-patch:
          applies-to: version-updates
          update-types:
            - "minor"
            - "patch"
        actions-security:
          applies-to: security-updates
          patterns:
            - "*"

